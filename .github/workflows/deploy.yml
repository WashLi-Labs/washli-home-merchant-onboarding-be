name: Deploy to GCP VM

# Trigger only when a PR targeting 'master' is closed
on:
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  deploy:
    # This single 'if' statement does exactly what you requested:
    # 1. Checks if the PR was actually MERGED (not just rejected/closed)
    # 2. Checks if the PR came from the 'main' branch
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'main'
    
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/washli-home-merchant-onboarding-be
            
            # Checkout the master branch (since we merged into master)
            git checkout master
            
            # Pull the latest merged code
            git pull origin master
            
            # Build and deploy the new container using Docker Compose
            docker-compose up -d --build
            
            # Clean up old unused images to save disk space
            docker image prune -f

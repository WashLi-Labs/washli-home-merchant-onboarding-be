name: Deploy to GCP VM

# Trigger when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # No PR check needed since we are watching main directly now
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # 1. Pull the backend code
            cd ~/washli-home-merchant-onboarding-be
            git checkout main
            git pull origin main
            
            # 2. Rebuild and deploy using the Central Infrastructure Repo
            cd ~/infra-repo
            docker-compose up -d --build
            
            # 3. Clean up old unused images to save disk space
            docker image prune -f

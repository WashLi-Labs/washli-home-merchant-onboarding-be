name: Deploy to GCP VM

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/washli-home-merchant-onboarding-be
            # Pull the latest code
            git pull origin main
            
            # Rebuild the Docker image with the new code
            docker build -t washli-be-image .
            
            # Stop the old container safely
            docker stop washli-be-container || true
            docker rm washli-be-container || true
            
            # Start the new container
            docker run -d -p 80:10000 --name washli-be-container --env-file .env --restart unless-stopped washli-be-image
            
            # Clean up old unused images to save disk space
            docker image prune -f

name: Deploy to GCP VM

# Trigger when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # No PR check needed since we are watching main directly now
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/washli-home-merchant-onboarding-be
            
            # Switch to main branch and pull latest code
            git checkout main
            git pull origin main
            
            # Build and deploy the new container using Docker Compose
            docker-compose up -d --build
            
            # Clean up old unused images to save disk space
            docker image prune -f

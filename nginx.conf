events {}

http {
    server {
        listen 80;

        # Python Merchant Backend
        location /merchant-be/ {
            # The trailing slash indicates we want Nginx to strip the "/merchant-be" 
            # prefix before sending traffic internally to FastAPI's port 10000
            proxy_pass http://washli-be:10000/;
            
            # Forward headers so logs show the real IP, not Nginx's Docker IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # The Quarkus washli-order Backend!
        location /order/ {
            proxy_pass http://washli-order-container:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
